name: HornetTracker

options:
  bundleIdPrefix: com.hivepulse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  HornetTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HornetTracker
        excludes:
          - Resources/Info.plist   # referenced via INFOPLIST_FILE, not compiled
    resources:
      - path: HornetTracker/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hivepulse.hornets
        INFOPLIST_FILE: HornetTracker/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic

  HornetTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HornetTrackerTests
    dependencies:
      - target: HornetTracker
        embed: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.hivepulse.hornets.tests

  HornetTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HornetTrackerUITests
    dependencies:
      - target: HornetTracker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.hivepulse.hornets.uitests

schemes:
  HornetTracker:
    build:
      targets:
        HornetTracker: all
        HornetTrackerTests: [test]
        HornetTrackerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HornetTrackerTests
        - HornetTrackerUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
