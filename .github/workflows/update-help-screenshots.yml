name: Update help page screenshots

# Trigger manually (choose platform) OR automatically after CI/CD succeeds on main.
# Web screenshots run against staging so they always reflect the latest deploy.
# Android screenshots build from the current commit.
# iOS screenshots are manual-only until the iOS app redesign is complete.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which platform(s) to capture'
        required: false
        default: 'all'
        type: choice
        options: [all, web, android, ios]

  # Auto-run after a successful CI/CD pipeline on main
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: screenshots
  cancel-in-progress: true

permissions:
  contents: write

# ── Helpers ────────────────────────────────────────────────────────────────────
env:
  STAGING_URL: https://apiscan-two.vercel.app
  DEMO_EMAIL: demo@apiscan.app
  DEMO_PASSWORD: demo1234

# ── Jobs ───────────────────────────────────────────────────────────────────────

jobs:

  # --------------------------------------------------------------------------
  # 1. Web screenshots  (ubuntu · Playwright against staging)
  # --------------------------------------------------------------------------
  web:
    name: Web screenshots
    runs-on: ubuntu-latest
    # Run on workflow_dispatch (all or web) OR on post-CI auto-run
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'web')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Capture web screenshots
        run: node scripts/web-screenshots.mjs
        env:
          STAGING_URL: ${{ env.STAGING_URL }}
          DEMO_EMAIL: ${{ env.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ env.DEMO_PASSWORD }}

      - name: Upload web screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-screenshots
          path: public/docs/screenshots/*.png
          retention-days: 1
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # 2. Android screenshots  (ubuntu · android-emulator-runner · ADB/Python)
  # --------------------------------------------------------------------------
  android:
    name: Android screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'android')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - name: Enable KVM (speeds up emulator ~10x)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m" \
            -PBASE_URL="https://apiscan-two.vercel.app/api/v1/"

      - name: Run Android screenshot capture in emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          heap-size: 512M
          disk-size: 4096M
          ram-size: 2048M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: python3 -u scripts/android-screenshots.py

      - name: Upload Android screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots
          path: public/docs/screenshots/android-*.png
          retention-days: 1
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # 3. iOS screenshots  (macos · xcrun simctl)
  # NOTE: Only runs when explicitly requested. The iOS navigation script
  #       (scripts/ios-screenshots.sh) needs to be implemented once the iOS
  #       app redesign is complete (issue #73 + full UI overhaul).
  # --------------------------------------------------------------------------
  ios:
    name: iOS screenshots
    runs-on: macos-15
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios')

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Boot iPhone 16 simulator
        run: |
          UDID=$(xcrun simctl create "Screenshots" "iPhone 16" "iOS-18-2")
          xcrun simctl boot "$UDID"
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Build and install iOS app
        run: |
          cd ios
          xcodebuild \
            -project HivePulse.xcodeproj \
            -scheme HivePulse \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -configuration Debug \
            build \
            ONLY_ACTIVE_ARCH=YES
          # Install the built app
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "HivePulse.app" -type d | head -1)
          xcrun simctl install "$SIM_UDID" "$APP"

      - name: Capture iOS screenshots
        run: bash scripts/ios-screenshots.sh "$SIM_UDID"
        env:
          DEMO_EMAIL: ${{ env.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ env.DEMO_PASSWORD }}

      - name: Upload iOS screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: public/docs/screenshots/ios-*.png
          retention-days: 1
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # 4. Commit all screenshots back to the repo
  # --------------------------------------------------------------------------
  commit:
    name: Commit screenshots
    runs-on: ubuntu-latest
    needs: [web, android]
    # Run even if one platform job was skipped, as long as at least one succeeded
    if: |
      always() &&
      (needs.web.result == 'success' || needs.android.result == 'success')

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT or the default GITHUB_TOKEN (needs write permission)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download web screenshots
        uses: actions/download-artifact@v4
        with:
          name: web-screenshots
          path: public/docs/screenshots
        continue-on-error: true

      - name: Download Android screenshots
        uses: actions/download-artifact@v4
        with:
          name: android-screenshots
          path: public/docs/screenshots
        continue-on-error: true

      - name: Commit and open PR for updated screenshots
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(screenshots): auto-update help page screenshots [skip ci]'
          branch: chore/auto-screenshots
          delete-branch: true
          title: 'chore(screenshots): auto-update help page screenshots'
          body: 'Automated screenshot update triggered by CI.'
          committer: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
