name: Migrate Staging DB

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: Run alembic upgrade head (staging)
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: prj_ZUxzSh8GAjSUBkQrxxYHqAq57SE1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (staging)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Run database migrations
        run: |
          set -a && source .vercel/.env.production.local && set +a
          cd backend

          # Write a helper that checks the current alembic state.
          # The staging DB was bootstrapped via Base.metadata.create_all(),
          # so tables exist but there is no alembic_version table.
          # In that case we stamp to 006 so that only migration 007
          # (add reminder columns) is applied by the subsequent upgrade.
          cat > /tmp/check_alembic.py << 'PYEOF'
import os, sys
from sqlalchemy import create_engine, text
engine = create_engine(os.environ["DATABASE_URL"])
with engine.connect() as conn:
    r = conn.execute(text(
        "SELECT EXISTS ("
        "  SELECT 1 FROM information_schema.tables"
        "  WHERE table_name='alembic_version'"
        ")"
    ))
    if not r.scalar():
        print("no_version_table")
        sys.exit(0)
    r2 = conn.execute(text("SELECT version_num FROM alembic_version LIMIT 1"))
    row = r2.fetchone()
    print(row[0] if row else "no_version_row")
PYEOF

          STATE=$(python3 /tmp/check_alembic.py)
          echo "Current alembic state: $STATE"

          if [ "$STATE" = "no_version_table" ] || [ "$STATE" = "no_version_row" ]; then
            echo "DB was bootstrapped via create_all — stamping to 006 before upgrade..."
            alembic stamp 006
          fi

          alembic upgrade head
