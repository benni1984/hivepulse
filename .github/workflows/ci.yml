name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Detect which paths changed ────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend:     ${{ steps.filter.outputs.backend }}
      android:     ${{ steps.filter.outputs.android }}
      ios:         ${{ steps.filter.outputs.ios }}
      web:         ${{ steps.filter.outputs.web }}
      ios_hornets: ${{ steps.filter.outputs.ios_hornets }}
      android_hornets: ${{ steps.filter.outputs.android_hornets }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            android:
              - 'android/**'
              - '.github/workflows/ci.yml'
            ios:
              - 'ios/**'
              - '.github/workflows/ci.yml'
            ios_hornets:
              - 'ios-hornets/**'
              - '.github/workflows/ci.yml'
            android_hornets:
              - 'android-hornets/**'
              - '.github/workflows/ci.yml'
            web:
              - 'app/**'
              - 'components/**'
              - 'i18n/**'
              - 'messages/**'
              - 'web/**'
              - 'next.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  # Each component job below always runs and always reports success when its
  # source tree is untouched, so the branch protection ruleset on main can keep
  # them as required checks without blocking single-component PRs.

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (pytest)
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice
        if: needs.changes.outputs.backend != 'true'
        run: echo "Backend unchanged — reporting success without running tests."

      - uses: actions/setup-python@v5
        if: needs.changes.outputs.backend == 'true'
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: needs.changes.outputs.backend == 'true'
        run: pip install -r requirements.txt

      - name: Run tests
        if: needs.changes.outputs.backend == 'true'
        run: pytest

  # ── Android unit tests ───────────────────────────────────────────────────────
  android-unit:
    name: Android unit tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice
        if: needs.changes.outputs.android != 'true'
        run: echo "Android unchanged — reporting success without running tests."

      - uses: actions/setup-java@v4
        if: needs.changes.outputs.android == 'true'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        if: needs.changes.outputs.android == 'true'
        run: chmod +x android/gradlew

      - name: Run unit tests
        if: needs.changes.outputs.android == 'true'
        run: cd android && ./gradlew test --no-daemon

      - name: Upload test results
        if: always() && needs.changes.outputs.android == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: android/app/build/reports/tests/

  # ── Android UI tests (emulator) ──────────────────────────────────────────────
  android-ui:
    name: Android UI tests (emulator)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice
        if: needs.changes.outputs.android != 'true'
        run: echo "Android unchanged — reporting success without running UI tests."

      - uses: actions/setup-java@v4
        if: needs.changes.outputs.android == 'true'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Enable KVM
        if: needs.changes.outputs.android == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission for gradlew
        if: needs.changes.outputs.android == 'true'
        run: chmod +x android/gradlew

      - name: Run UI tests
        if: needs.changes.outputs.android == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: cd android && ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload UI test results
        if: always() && needs.changes.outputs.android == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: android/app/build/reports/androidTests/

  # ── iOS build & test ─────────────────────────────────────────────────────────
  # Runs on macos-latest whenever ios/ changes (both PRs and pushes to main).
  # Uses a path filter so unchanged runs report success without spending macOS minutes.
  ios:
    name: iOS build & test
    needs: changes
    runs-on: ${{ needs.changes.outputs.ios == 'true' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice
        if: needs.changes.outputs.ios != 'true'
        run: echo "iOS unchanged — reporting success without running tests."

      - name: Select Xcode
        if: needs.changes.outputs.ios == 'true'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        if: needs.changes.outputs.ios == 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: needs.changes.outputs.ios == 'true'
        run: cd ios && xcodegen generate --spec project.yml

      - name: Resolve simulator
        if: needs.changes.outputs.ios == 'true'
        run: |
          UDID=$(xcrun simctl list devices available \
            | grep 'iPhone 16 (' | head -1 | awk -F'[()]' '{print $2}')
          if [ -z "$UDID" ]; then
            echo "No iPhone 16 simulator found:"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Found simulator: $UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Build & test
        if: needs.changes.outputs.ios == 'true'
        run: |
          xcodebuild test \
            -project ios/ApiScan.xcodeproj \
            -scheme ApiScan \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -resultBundlePath TestResults

      - name: Upload test results
        if: always() && needs.changes.outputs.ios == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: TestResults.xcresult

  # ── iOS Hornet Tracker (standalone app) ──────────────────────────────────────
  ios-hornets:
    name: iOS Hornet Tracker build & test
    needs: changes
    runs-on: ${{ needs.changes.outputs.ios_hornets == 'true' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice
        if: needs.changes.outputs.ios_hornets != 'true'
        run: echo "ios-hornets unchanged — reporting success without running tests."

      - name: Select Xcode
        if: needs.changes.outputs.ios_hornets == 'true'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        if: needs.changes.outputs.ios_hornets == 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: needs.changes.outputs.ios_hornets == 'true'
        run: cd ios-hornets && xcodegen generate --spec project.yml

      - name: Resolve simulator
        if: needs.changes.outputs.ios_hornets == 'true'
        run: |
          UDID=$(xcrun simctl list devices available \
            | grep 'iPhone 16 (' | head -1 | awk -F'[()]' '{print $2}')
          if [ -z "$UDID" ]; then
            echo "No iPhone 16 simulator found:"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Found simulator: $UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Build & test
        if: needs.changes.outputs.ios_hornets == 'true'
        run: |
          xcodebuild test \
            -project ios-hornets/HornetTracker.xcodeproj \
            -scheme HornetTracker \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -resultBundlePath HornetTrackerTestResults

      - name: Upload test results
        if: always() && needs.changes.outputs.ios_hornets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-hornets-test-results
          path: HornetTrackerTestResults.xcresult

  # ── Web build & test ──────────────────────────────────────────────────────────
  web:
    name: Web build & test
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice
        if: needs.changes.outputs.web != 'true'
        run: echo "Web unchanged — reporting success without running tests."

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.web == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: needs.changes.outputs.web == 'true'
        # The lock file is generated on Windows and omits resolved URLs for
        # Linux-specific optional binaries (@parcel/watcher, rollup, etc.).
        # Deleting it forces npm to resolve all optional deps for the current OS.
        run: rm -f package-lock.json && npm install

      - name: Run unit tests (Vitest)
        if: needs.changes.outputs.web == 'true'
        run: npm test

      - name: Install Playwright browser
        if: needs.changes.outputs.web == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build
        if: needs.changes.outputs.web == 'true'
        run: npm run build

      - name: Run e2e tests (Playwright)
        if: needs.changes.outputs.web == 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always() && needs.changes.outputs.web == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy preview (PRs only, after all quality gates pass) ──────────────────
  deploy-preview:
    name: Deploy preview to Vercel
    needs: [backend, android-unit, android-ui, ios, ios-hornets, web]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@v5

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy and capture URL
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview deployed: ${{ steps.deploy.outputs.url }}`
            })

  # ── E2E tests against live staging (push to main only) ───────────────────────
  e2e-staging:
    name: E2E tests against staging
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run staging e2e tests
        run: npm run test:e2e:staging
        env:
          STAGING_DEMO_EMAIL: ${{ secrets.STAGING_DEMO_EMAIL }}
          STAGING_DEMO_PASSWORD: ${{ secrets.STAGING_DEMO_PASSWORD }}
          STAGING_ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
          STAGING_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
          CI_SETUP_TOKEN: ${{ secrets.CI_SETUP_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-e2e-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy production (push to main only, after staging E2E gate passes) ──────
  deploy-production:
    name: Deploy production to Vercel
    needs: [e2e-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@v5

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-staging:
    name: Deploy staging to Vercel
    needs: [backend, android-unit, android-ui, ios, ios-hornets, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: prj_ZUxzSh8GAjSUBkQrxxYHqAq57SE1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@v5

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
