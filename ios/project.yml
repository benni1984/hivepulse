name: HivePulse

options:
  bundleIdPrefix: com.hivepulse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  HivePulse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HivePulse
        excludes:
          - Resources/Info.plist   # referenced via INFOPLIST_FILE, not compiled
    resources:
      - path: HivePulse/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hivepulse.app
        INFOPLIST_FILE: HivePulse/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic

  HivePulseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HivePulseTests
    dependencies:
      - target: HivePulse
        embed: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.hivepulse.tests

  HivePulseUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HivePulseUITests
    dependencies:
      - target: HivePulse
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.hivepulse.uitests

schemes:
  HivePulse:
    build:
      targets:
        HivePulse: all
        HivePulseTests: [test]
        HivePulseUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HivePulseTests
        - HivePulseUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
